<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDG Suite - Enterprise CFDI 4.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        corporate: { 50: '#f4f7f9', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8', 400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#0f2032' },
                        gold: { 500: '#d4af37', 600: '#b5952f' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #829ab1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #627d98; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .drag-active { border-color: #d4af37 !important; background-color: #f8fafc !important; }
        
        .datagrid-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; border-radius: 0.75rem; border: 1px solid #e2e8f0; position: relative; width: 100%; min-width: 0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .datagrid { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.75rem; }
        .datagrid th { background: #f8fafc; color: #475569; font-weight: 700; padding: 0.85rem 1rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 10; white-space: nowrap; box-shadow: 0 1px 2px rgba(0,0,0,0.05); cursor: pointer; transition: background 0.2s;}
        .datagrid th:hover { background: #f1f5f9; }
        .datagrid td { padding: 0.7rem 1rem; border-bottom: 1px solid #f1f5f9; white-space: nowrap; color: #334155; }
        .datagrid tbody tr:hover td { background-color: #f8fafc; }
        .datagrid tbody tr:nth-child(even) { background-color: #fafbfc; }
        .datagrid tfoot td { position: sticky; bottom: 0; background: #0f2032; color: white; font-weight: bold; border-top: 2px solid #334e68; letter-spacing: 0.025em; }
        
        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-weight: 700; font-size: 0.65rem; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; letter-spacing: 0.025em;}
        .badge-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .badge-warning { background: #fef08a; color: #854d0e; border: 1px solid #fde047; }
        .badge-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .badge-info { background: #e0f2fe; color: #1e40af; border: 1px solid #bae6fd; }
        .badge-purple { background: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }
        .badge-gray { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body class="bg-corporate-50 font-sans text-corporate-800 h-screen flex overflow-hidden">

    <!-- Global Loader -->
    <div id="loader" class="fixed inset-0 bg-white/95 backdrop-blur-md z-[100] flex flex-col items-center justify-center hidden transition-opacity">
        <div class="relative">
            <i class="fas fa-circle-notch fa-spin text-7xl text-corporate-600"></i>
            <i class="fas fa-shield-alt absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-gold-500 text-2xl"></i>
        </div>
        <h2 class="text-2xl font-black text-corporate-900 mt-6 tracking-tight" id="loader-text">Analizando Nodos SAT...</h2>
        <p class="text-sm text-gray-500 mt-2 font-medium">Validando estructura, retenciones y normativas CFDI 4.0</p>
        <div class="w-80 bg-gray-200 rounded-full h-3 mt-5 overflow-hidden shadow-inner">
            <div id="loader-progress" class="bg-gradient-to-r from-corporate-500 to-corporate-800 h-3 rounded-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- Sidebar Navegación -->
    <aside class="w-72 bg-gradient-to-b from-corporate-900 to-corporate-800 text-white flex flex-col shadow-2xl z-20 flex-shrink-0 transition-all border-r border-corporate-700/50">
        
        <!-- ========================================== -->
        <!-- ZONA DE LOGOTIPO DINÁMICO                  -->
        <!-- ========================================== -->
        <div class="p-7 border-b border-corporate-700/50">
            <div class="flex items-center">
                <!-- 1. Etiqueta de Imagen (Busca el archivo logo.png) -->
                <!-- Si falla al cargar, ejecuta el onerror y muestra el texto de respaldo -->
                <img src="./assets/logo.png" alt="CDG Suite Logo" class="h-10 w-auto object-contain drop-shadow-md" onerror="this.style.display='none'; document.getElementById('logo-fallback').classList.remove('hidden');">
                
                <!-- 2. Respaldo en Texto (Oculto por defecto con 'hidden') -->
                <h1 id="logo-fallback" class="text-3xl font-black tracking-tighter text-white items-center hidden">
                    <i class="fas fa-layer-group text-gold-500 mr-3 text-2xl drop-shadow-md"></i> CDG <span class="text-corporate-300 font-light ml-1">Suite</span>
                </h1>
            </div>
            <p class="text-[10px] text-corporate-400 mt-2 tracking-[0.2em] uppercase font-semibold">Enterprise Edition</p>
        </div>
        <!-- ========================================== -->

        <nav class="flex-1 p-5 space-y-2 overflow-y-auto text-sm font-medium" id="sidebar-nav"></nav>
        
        <div class="p-6 border-t border-corporate-800 bg-corporate-900/40">
            <button onclick="AppCore.clearSession()" class="w-full flex items-center justify-center p-3 rounded-xl border border-red-500/50 text-red-400 hover:bg-red-600 hover:text-white hover:border-red-600 transition-all duration-300 text-xs font-bold uppercase tracking-wider shadow-sm group">
                <i class="fas fa-trash-alt mr-2 group-hover:scale-110 transition-transform"></i> Finalizar y Limpiar
            </button>
            <p class="text-[9px] text-center mt-3 text-corporate-400 font-medium leading-relaxed">Por seguridad, borre los datos<br>al terminar su análisis.</p>
        </div>
    </aside>

    <!-- Contenedor Principal -->
    <main class="flex-1 flex flex-col h-full relative bg-corporate-50 min-w-0">
        <header class="bg-white border-b border-gray-200 px-6 lg:px-8 py-4 lg:py-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 sticky top-0 z-10 shadow-sm flex-shrink-0 w-full">
            <div class="flex-1 min-w-0 w-full">
                <h2 id="view-title" class="text-2xl font-black text-corporate-900 tracking-tight truncate">Cargando...</h2>
                <p id="view-subtitle" class="text-sm text-gray-500 mt-1 font-medium truncate">Inicializando motor local...</p>
            </div>
            <div class="flex flex-wrap items-center gap-3 lg:gap-4 max-w-full">
                <div id="company-badge" class="hidden px-4 lg:px-5 py-2 lg:py-2.5 bg-gradient-to-r from-blue-50 to-indigo-50 text-blue-800 rounded-xl text-xs lg:text-sm font-bold border border-blue-100 shadow-sm flex items-center max-w-full cursor-default transition-all hover:shadow-md">
                    <i class="fas fa-building mr-2 text-blue-600 flex-shrink-0"></i> 
                    <span id="company-rfc" class="truncate max-w-[200px] sm:max-w-[350px] md:max-w-[450px] lg:max-w-[600px] xl:max-w-[800px]"></span>
                </div>
                <div class="px-4 lg:px-5 py-2 lg:py-2.5 bg-white text-corporate-800 rounded-xl text-xs lg:text-sm font-bold border border-gray-200 shadow-sm flex items-center flex-shrink-0">
                    <i class="fas fa-file-invoice mr-2 text-corporate-500"></i> <span id="xml-count" class="mr-1">0</span> Docs
                </div>
            </div>
        </header>
        <div class="p-6 md:p-8 flex-1 flex flex-col overflow-y-auto overflow-x-hidden relative min-h-0 min-w-0" id="main-container"></div>
    </main>

    <!-- Toasts -->
    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-24 opacity-0 transition-all duration-300 bg-corporate-900 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center z-[120] text-sm font-medium border border-corporate-700">
        <i class="fas fa-info-circle mr-3 text-gold-500 text-xl" id="toast-icon"></i><span id="toast-msg">Mensaje</span>
    </div>

    <!-- PUNTO DE ENTRADA MODULAR -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
